experiments:

  small_35M:
    name: small_35M
    pretrained_model: smol_poet_35M.pt

    model:
      embed_size: 512
      num_layers: 12
      heads: 8
      kv: 4
      dropout: 0.0

    train:
      batch_size: 128
      lr: 3e-4
      num_epochs: 5
      block_size: 512

    rl:
      steps: 3000
      temperature: 0.9
      max_new_tokens: 64
      k: 8
      beta_kl: 0.005
      clip_eps: 0.2
      lr: 1e-6

  base_100M:
    name: base_100M
    pretrained_model: smol_poet_100M.pt

    model:
      embed_size: 512
      num_layers: 12
      heads: 8
      kv: 4
      dropout: 0.0

    train:
      batch_size: 128
      lr: 3e-4

    rl:
      lr: 1e-6

  large_200M:
    name: large_200M
    pretrained_model: smol_poet_200M.pt

    model:
      embed_size: 768
      num_layers: 16
      heads: 12
      kv: 6
      dropout: 0.0

    train:
      batch_size: 64
      lr: 2e-4

    rl:
      lr: 5e-7

